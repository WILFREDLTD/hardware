version: '3.9'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hardware_stocks
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hardware_stocks
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: docker-nextauth-secret
      NEXT_TELEMETRY_DISABLED: '1'
    command: sh -c "npx prisma migrate deploy && npm run start"
    restart: unless-stopped

volumes:
  db_data:
